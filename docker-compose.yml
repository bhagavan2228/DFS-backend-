# Example stack: MySQL + API + UI (nginx proxies /api -> api).
# From discussion-forum/: docker compose up --build
# Set strong passwords and JWT_SECRET before production use.

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: dfs
    ports:
      - "3306:3306"
    volumes:
      - dfs_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build: .
    ports:
      - "8082:8082"
    environment:
      DATASOURCE_URL: jdbc:mysql://db:3306/dfs?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATASOURCE_USERNAME: root
      DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "false"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ../frontend-dfs/dfsfront
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  dfs_mysql_data:
