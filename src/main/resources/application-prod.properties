# Production datasource (Render/Aiven). Prefer setting DATASOURCE_* env vars in Render.
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://mysql-321de275-muthinenibhagavan-e928.b.aivencloud.com:15872/defaultdb?ssl-mode=REQUIRED}
spring.datasource.username=${DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${DATASOURCE_PASSWORD:}

# Activate with: spring.profiles.active=prod
spring.jpa.show-sql=false
# Set JPA_DDL_AUTO=validate once the schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# Silence redundant security configuration warnings
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

management.endpoint.health.show-details=never

logging.level.root=WARN
logging.level.com.fourm.discussion_forum=INFO
