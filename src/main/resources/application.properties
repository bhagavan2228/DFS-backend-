spring.application.name=discussion-forum

# --- Database (override in production with env vars) ---
# Local dev: MySQL. Render prod: PostgreSQL (set DATASOURCE_URL env var).
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://mysql-321de275-muthinenibhagavan-e928.b.aivencloud.com:15872/defaultdb?ssl-mode=REQUIRED}
spring.datasource.username=${DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:}

# --- JPA ---
# Dev: update. Production: set JPA_DDL_AUTO=validate (or none) when using migrations.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
# Hibernate auto-detects dialect from JDBC URL (works for both MySQL & PostgreSQL)

# --- JWT (must be at least 32 bytes for HS256; set JWT_SECRET in production) ---
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8080}

# --- Actuator (health for load balancers / k8s) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# --- CORS: comma-separated patterns, e.g. https://app.example.com,http://localhost:3000
# Use * for allow-all (dev). For credentialed browsers + specific origins, list each origin pattern.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

# Shown by GET /actuator/info
info.application.name=discussion-forum
